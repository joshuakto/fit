name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    env:
      # Required for crypto module on node <19 (for SHA-1 digest)
      NODE_OPTIONS: "--experimental-global-webcrypto"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Corresponds to Obsidian 1.4.0
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      id: lint
      run: |
        npm run lint
        exit_code=$?
        if [ $exit_code -eq 1 ]; then
          echo "lint_result=success_with_warnings" >> $GITHUB_OUTPUT
          exit 0
        elif [ $exit_code -eq 0 ]; then
          echo "lint_result=success" >> $GITHUB_OUTPUT
          exit 0
        else
          echo "lint_result=execution_failure" >> $GITHUB_OUTPUT
          exit 1
        fi
      continue-on-error: true

    - name: Run TypeScript compiler
      id: typecheck
      run: npm run typecheck
      continue-on-error: true

    - name: Run tests with coverage
      id: test
      run: npm test -- --coverage
      continue-on-error: true

    - name: Check for release anti-patterns
      id: release_check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git fetch origin ${{ github.base_ref }} --depth=1
        BASE="origin/${{ github.base_ref }}"

        CHANGED=$(git diff --name-only "${BASE}" HEAD)
        VERSION_FILES=$(echo "$CHANGED" | grep -E '^(manifest\.json|package\.json|versions\.json)$' || true)
        CODE_FILES=$(echo "$CHANGED" | grep -vE '^(manifest\.json|package\.json|versions\.json)$' | grep -E '\.(ts|js|css|mjs)$' || true)

        FAILED=false

        if [ -n "$VERSION_FILES" ]; then
          if [ -n "$CODE_FILES" ]; then
            echo "::error::Version files changed alongside code files. Version bumps must be in dedicated commits/PRs — see docs/CONTRIBUTING.md for the release process."
            FAILED=true
          fi

          NEW_VERSION=$(jq -r '.version' manifest.json)
          PKG_VERSION=$(jq -r '.version' package.json)

          if [ "$NEW_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::manifest.json version (${NEW_VERSION}) does not match package.json version (${PKG_VERSION})."
            FAILED=true
          fi

          if [ "${{ github.base_ref }}" = "main" ] && echo "$NEW_VERSION" | grep -q -- '-beta'; then
            echo "::error::Beta version (${NEW_VERSION}) must not appear in manifest.json on main. Beta bumps happen on the beta branch only."
            FAILED=true
          fi

          BASE_VERSION=$(git show "${BASE}:manifest.json" | jq -r '.version')
          if [ "${{ github.base_ref }}" = "main" ] && [ "$NEW_VERSION" != "$BASE_VERSION" ] && ! echo "$NEW_VERSION" | grep -q -- '-'; then
            echo "Checking GitHub Release exists for ${NEW_VERSION}..."
            if ! gh release view "$NEW_VERSION" > /dev/null 2>&1; then
              echo "::error::No GitHub Release found for version ${NEW_VERSION}. Create the GitHub Release (tag: ${NEW_VERSION}, no 'v' prefix) before merging this version bump."
              FAILED=true
            else
              echo "✅ GitHub Release ${NEW_VERSION} exists"
            fi
          fi
        fi

        if $FAILED; then
          exit 1
        fi
        echo "✅ No release anti-patterns detected"
      continue-on-error: true

    - name: Generate status summary
      id: summary
      run: |
        lint_result="${{ steps.lint.outputs.lint_result }}"
        typecheck_status="${{ steps.typecheck.outcome }}"
        test_status="${{ steps.test.outcome }}"

        if [[ "$lint_result" == "success" ]]; then
          lint_icon="✅"
          lint_status="success"
        elif [[ "$lint_result" == "success_with_warnings" ]]; then
          lint_icon="⚠️"
          lint_status="success"
        else
          lint_icon="❌"
          lint_status="failure"
        fi
        typecheck_icon="❌"; [[ "$typecheck_status" == "success" ]] && typecheck_icon="✅"
        test_icon="❌"; [[ "$test_status" == "success" ]] && test_icon="✅"

        if [[ "$lint_status" == "success" && "$typecheck_status" == "success" && "$test_status" == "success" ]]; then
          overall_message="🎉 **All checks passed!** Great work on maintaining code quality."
        elif [[ "$typecheck_status" != "success" || "$test_status" != "success" ]]; then
          overall_message="🚫 **Critical failures detected.**"
        else
          overall_message="⚠️ **Linting issues detected.** Please fix code style issues."
        fi

        cat << EOF > pr_comment.md
        ## 🔍 Code Quality Check Results

        | Check | Status | Details |
        |-------|--------|---------|
        | **Linting** | ${lint_icon} | ESLint code quality check |
        | **Type Check** | ${typecheck_icon} | TypeScript compilation |
        | **Unit Tests** | ${test_icon} | Jest test execution |

        ${overall_message}
        <details>
        <summary>📊 Test Coverage Report</summary>

        [View coverage details in the action run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        </details>
        EOF

    - name: Comment PR
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: pr_comment.md
        edit-mode: replace
        token: ${{ secrets.GITHUB_TOKEN }}
      if: github.event.pull_request.head.repo.full_name == github.repository

    - name: Log comment status
      run: |
        if [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
          echo "✅ PR comment posted successfully"
        else
          echo "ℹ️ Skipped PR comment - external fork lacks write permissions"
          echo "Check results above: Lint: ${{ steps.lint.outcome }}, TypeCheck: ${{ steps.typecheck.outcome }}, Tests: ${{ steps.test.outcome }}, Release: ${{ steps.release_check.outcome }}"
        fi

    - name: Fail workflow if critical checks failed
      run: |
        if [[ "${{ steps.test.outcome }}" != "success" ]]; then
          echo "❌ Tests failed - blocking PR merge"
          exit 1
        fi
        if [[ "${{ steps.typecheck.outcome }}" != "success" ]]; then
          echo "❌ TypeScript compilation failed - blocking PR merge"
          exit 1
        fi
        if [[ "${{ steps.release_check.outcome }}" != "success" ]]; then
          echo "❌ Release anti-patterns detected - blocking PR merge"
          exit 1
        fi
        echo "✅ All critical checks passed"
